<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Geofence UEM · Command Center</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&display=swap" rel="stylesheet" />
  <style>
  /* ============================================================
     GEOfence UEM — Design System (inspirado en Linear)
     - Densidad compacta, tipografía ajustada, acentos sutiles
     - Tema dark por defecto, light opcional
     ============================================================ */
  :root{
    --bg:#08090a; --bg-2:#0c0d0f; --panel:#111214; --panel-2:#16181b; --panel-3:#1c1f23;
    --border:#26282c; --border-strong:#34373d;
    --fg:#f7f8f8; --fg-2:#d4d6d9; --muted:#8a8f98; --muted-2:#62666d;
    --accent:#5e6ad5; --accent-h:#6e78e0; --accent-soft:rgba(94,106,213,.14); --accent-soft-2:rgba(94,106,213,.28);
    --green:#4cc38a; --green-soft:rgba(76,195,138,.14);
    --blue:#4ea7fc; --blue-soft:rgba(78,167,252,.14);
    --amber:#f2c94c; --amber-soft:rgba(242,201,76,.14);
    --red:#ff6b6b; --red-soft:rgba(255,107,107,.14);
    --violet:#b18cff; --violet-soft:rgba(177,140,255,.14);
    --radius:8px; --radius-lg:12px; --radius-sm:6px;
    --shadow:0 1px 2px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
    --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --mono:ui-monospace,'SF Mono','JetBrains Mono',Menlo,monospace;
    --header-h:48px; --side-w:228px;
  }
  html[data-theme="light"]{
    --bg:#fbfbfa; --bg-2:#f4f4f3; --panel:#ffffff; --panel-2:#f7f7f6; --panel-3:#efefee;
    --border:#ebebea; --border-strong:#dcdcdb;
    --fg:#1c1d1f; --fg-2:#3a3c40; --muted:#6b6f76; --muted-2:#969a9f;
    --accent:#5e6ad5; --accent-h:#6e78e0; --accent-soft:rgba(94,106,213,.10); --accent-soft-2:rgba(94,106,213,.18);
    --green:#1f9d63; --green-soft:rgba(31,157,99,.12);
    --blue:#2f80ed; --blue-soft:rgba(47,128,237,.10);
    --amber:#b7791f; --amber-soft:rgba(183,121,31,.12);
    --red:#e03131; --red-soft:rgba(224,49,49,.10);
    --violet:#7c4dff; --violet-soft:rgba(124,77,255,.10);
    --shadow:0 1px 2px rgba(0,0,0,.06),0 6px 20px rgba(0,0,0,.06);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:var(--font);background:var(--bg);color:var(--fg);font-size:13px;line-height:1.45;
    -webkit-font-smoothing:antialiased;letter-spacing:-.011em;overflow:hidden}
  ::selection{background:var(--accent-soft-2)}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:99px;border:2px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:var(--muted-2);background-clip:content-box}
  .hidden{display:none !important}
  svg{display:block}
  button{font-family:inherit}

  /* ---------- APP SHELL ---------- */
  .app{display:grid;grid-template-columns:var(--side-w) 1fr;height:100vh}

  /* ---------- SIDEBAR ---------- */
  .side{background:var(--bg-2);border-right:1px solid var(--border);display:flex;flex-direction:column;
    padding:10px 8px;gap:2px;overflow:hidden}
  .brand{display:flex;align-items:center;gap:9px;padding:6px 8px 12px;cursor:default}
  .brand .lg{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--accent),#8b5cf6);
    display:grid;place-items:center;color:#fff;flex:none;box-shadow:0 0 0 1px rgba(255,255,255,.08) inset}
  .brand .lg svg{width:16px;height:16px}
  .brand b{font-size:13px;font-weight:600;letter-spacing:-.02em;line-height:1.1}
  .brand small{display:block;font-size:10px;color:var(--muted);font-weight:500;margin-top:1px}
  .nav-sec{font-size:10px;font-weight:600;color:var(--muted-2);text-transform:uppercase;letter-spacing:.07em;
    padding:14px 10px 5px}
  .nav a{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:var(--radius-sm);color:var(--muted);
    font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;transition:background .12s,color .12s;position:relative}
  .nav a svg{width:16px;height:16px;flex:none;opacity:.85}
  .reicon{display:inline-block;vertical-align:middle;flex:none}
  .nav-ic{width:18px;height:18px}
  .app-row{padding:8px 10px;border:1px solid var(--border);border-radius:10px;margin-bottom:6px;background:var(--panel)}
  .app-h{display:flex;align-items:center;gap:8px;font-size:13px}
  .app-cves{margin-top:5px;display:flex;flex-wrap:wrap;gap:5px}
  /* ---------- SOAR / CVE view ---------- */
  #soarKpis.kpis{grid-template-columns:repeat(4,1fr)}
  .soar-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .soar-pbs{display:flex;flex-direction:column;gap:10px}
  .soar-pb{border:1px solid var(--border);border-radius:12px;padding:12px 14px;background:var(--panel)}
  .soar-pb-h{display:flex;align-items:center;gap:8px;font-size:14px}
  .soar-pb-h .tag{margin-left:0}
  .soar-acts{margin-top:8px;display:flex;flex-wrap:wrap;gap:5px}
  .soar-hit.sev-critical{border-left:3px solid var(--red)}
  .soar-hit.sev-high{border-left:3px solid var(--amber)}
  .soar-hit.sev-medium{border-left:3px solid var(--blue)}
  .soar-devs{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
  .soar-dev{border:1px solid var(--border);border-radius:12px;padding:12px 14px;background:var(--panel)}
  .soar-dev .hd{margin-bottom:8px}
  @media(max-width:1100px){.soar-grid{grid-template-columns:1fr}}
  .nav a.active svg{opacity:1}
  .nav a.active{background:var(--accent-soft);color:#fff}
  html[data-theme="light"] .nav a.active{color:var(--accent)}
  .nav a.active svg{opacity:1}
  .nav a .badge-dot{margin-left:auto;width:6px;height:6px;border-radius:50%;background:var(--red)}
  .nav-badge{margin-left:auto;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--red);color:#fff;font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;line-height:1}
  .nav a.active .nav-badge{background:#fff;color:var(--red)}
  .side .spacer{flex:1}
  .side-foot{margin-top:8px;padding:10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--panel)}
  .side-foot .row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
  .side-foot .row b{color:var(--fg-2);font-weight:600;margin-left:auto;font-variant-numeric:tabular-nums}
  .side-foot .plan{display:flex;align-items:center;gap:7px;margin-bottom:8px}
  .side-foot .plan .p{font-size:12px;font-weight:600}
  .pill{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 6px;border-radius:5px;
    background:var(--accent-soft);color:var(--accent)}
  html[data-theme="light"] .pill{color:var(--accent)}

  /* ---------- MAIN ---------- */
  .main{display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .topbar{height:var(--header-h);flex:none;display:flex;align-items:center;gap:14px;padding:0 18px;
    border-bottom:1px solid var(--border);background:color-mix(in srgb,var(--bg) 85%,transparent);backdrop-filter:blur(10px)}
  .crumbs{display:flex;align-items:center;gap:7px;font-size:13px}
  .crumbs .sep{color:var(--muted-2)}
  .crumbs .pv{color:var(--muted);font-weight:500}
  .crumbs .cv{color:var(--fg);font-weight:600}
  .topbar .grow{flex:1}
  .sync{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted);font-weight:500}
  .sync .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .sync.stale .dot{background:var(--amber);box-shadow:0 0 0 3px var(--amber-soft)}
  .ibtn{width:32px;height:32px;display:grid;place-items:center;border-radius:var(--radius-sm);border:1px solid var(--border);
    background:var(--panel);color:var(--muted);cursor:pointer;transition:.12s}
  .ibtn:hover{color:var(--fg-2);border-color:var(--border-strong);background:var(--panel-2)}
  .ibtn svg{width:16px;height:16px}
  .btn{display:inline-flex;align-items:center;gap:7px;height:32px;padding:0 13px;font-size:12.5px;font-weight:550;
    border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--panel);color:var(--fg-2);cursor:pointer;transition:.12s}
  .btn svg{width:15px;height:15px}
  .btn:hover{background:var(--panel-2);border-color:var(--border-strong);color:var(--fg)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent-h);border-color:var(--accent-h)}
  .btn.sm{height:28px;padding:0 10px;font-size:12px}

  .view{flex:1;overflow:auto;padding:20px 24px 32px;max-width:1500px;width:100%;margin:0 auto}

  /* ---------- CARDS ---------- */
  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
  .card>.hd{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--border)}
  .card>.hd h3{margin:0;font-size:13px;font-weight:600;letter-spacing:-.01em}
  .card>.hd .grow{flex:1}
  .card>.bd{padding:16px}
  .card .sub{font-size:11.5px;color:var(--muted)}

  /* ---------- KPI (compactos) ---------- */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:18px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .grid3 .kpi{padding:12px 14px}
  .kpi{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);padding:13px 14px;position:relative;overflow:hidden}
  .kpi .lab{font-size:11px;color:var(--muted);font-weight:500}
  .kpi .val{font-size:24px;font-weight:600;letter-spacing:-.03em;margin-top:6px;font-variant-numeric:tabular-nums;line-height:1}
  .kpi .bot{display:flex;align-items:center;gap:5px;margin-top:7px;font-size:11px;color:var(--muted)}
  .kpi.ok .val{color:var(--green)} .kpi.acc .val{color:var(--blue)} .kpi.warn .val{color:var(--amber)} .kpi.bad .val{color:var(--red)}
  .kpi .ic{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:8px;display:grid;place-items:center;opacity:.9}
  .kpi.ok .ic{background:var(--green-soft);color:var(--green)} .kpi.acc .ic{background:var(--blue-soft);color:var(--blue)}
  .kpi.warn .ic{background:var(--amber-soft);color:var(--amber)} .kpi.bad .ic{background:var(--red-soft);color:var(--red)}
  .kpi .ic svg{width:15px;height:15px}
  .delta{font-size:11px;font-weight:600}
  .delta.up{color:var(--green)} .delta.down{color:var(--red)}

  /* ---------- GRID ---------- */
  .grid-main{display:grid;grid-template-columns:1.7fr 1fr;gap:14px;align-items:start}
  @media(max-width:1100px){.grid-main{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(4,1fr)}}

  /* ---------- MAP ---------- */
  #map{width:100%;height:440px;border-radius:0}
  .map-wrap{position:relative}
  .map-legend{position:absolute;left:12px;bottom:12px;z-index:500;background:color-mix(in srgb,var(--panel) 92%,transparent);
    border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:11px;color:var(--muted);display:flex;gap:14px;backdrop-filter:blur(6px)}
  .map-legend .it{display:flex;align-items:center;gap:6px}
  .map-legend .sw{width:9px;height:9px;border-radius:3px}

  /* ---------- TABLE (Linear style) ---------- */
  .tt{width:100%;border-collapse:collapse}
  .tt thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted-2);font-weight:600;
    padding:0 14px 9px;border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0;background:var(--panel)}
  .tt thead th.sort{cursor:pointer;user-select:none}
  .tt thead th.sort:hover{color:var(--fg-2)}
  .tt tbody td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:12.5px;vertical-align:middle;white-space:nowrap}
  .tt tbody tr{cursor:pointer;transition:background .1s}
  .tt tbody tr:hover{background:var(--panel-2)}
  .tt tbody tr:last-child td{border-bottom:0}
  .dev{display:flex;align-items:center;gap:10px;min-width:0}
  .av{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff;flex:none}
  .dev .nm{font-weight:550;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dev .sub{font-size:10.5px;color:var(--muted);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis}
  .plat{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-weight:500}
  .plat svg{width:14px;height:14px}
  .tag{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:99px;letter-spacing:-.01em;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .tag .d{width:5px;height:5px;border-radius:50%}
  .tag.in{background:var(--green-soft);color:var(--green)} .tag.out{background:var(--blue-soft);color:var(--blue)}
  .tag.unk{background:var(--panel-3);color:var(--muted)} .tag.nocomp{background:var(--red-soft);color:var(--red)}
  .cbar{height:5px;border-radius:99px;background:var(--panel-3);overflow:hidden;width:64px}
  .cbar i{display:block;height:100%;background:var(--green);border-radius:99px}
  .cbar.low i{background:var(--red)} .cbar.mid i{background:var(--amber)}
  .mono{font-family:var(--mono);font-size:11px;color:var(--muted)}

  /* ---------- TIMELINE ---------- */
  .tl{display:flex;flex-direction:column;max-height:420px;overflow:auto}
  .ev{display:flex;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)}
  .ev:last-child{border-bottom:0}
  .ev .ic{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:none;background:var(--panel-2);border:1px solid var(--border);color:var(--muted)}
  .ev .ic svg{width:13px;height:13px}
  .ev.enter .ic{background:var(--green-soft);border-color:transparent;color:var(--green)}
  .ev.exit .ic{background:var(--blue-soft);border-color:transparent;color:var(--blue)}
  .ev.action .ic{background:var(--accent);border-color:transparent;color:#fff}
  .ev .body{flex:1;min-width:0}
  .ev .t{font-size:12px;font-weight:500}
  .ev .d{font-size:11px;color:var(--muted);margin-top:1px}
  .ev .time{font-size:10px;color:var(--muted-2);white-space:nowrap;font-family:var(--mono)}

  /* ---------- TOOLBAR / CHIPS ---------- */
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .filters{display:flex;gap:5px;flex-wrap:wrap}
  .chip{font-size:12px;padding:6px 11px;border-radius:99px;border:1px solid var(--border);background:var(--panel);color:var(--muted);cursor:pointer;font-weight:500;transition:.12s;display:inline-flex;align-items:center;gap:5px}
  .chip:hover{color:var(--fg-2);border-color:var(--border-strong)}
  .chip.active{background:var(--accent-soft);color:#fff;border-color:var(--accent-soft-2)}
  html[data-theme="light"] .chip.active{color:var(--accent)}
  .search{flex:1;max-width:300px;height:32px;padding:0 11px;font-size:12.5px;background:var(--panel);color:var(--fg);
    border:1px solid var(--border);border-radius:var(--radius-sm);transition:.12s}
  .search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  /* ---------- DONUT ---------- */
  .donut-wrap{display:flex;align-items:center;gap:18px}
  .donut{position:relative;flex:none}
  .donut .center{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
  .donut .center .big{font-size:22px;font-weight:600;letter-spacing:-.03em}
  .donut .center .lab{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .legend-col{display:flex;flex-direction:column;gap:7px;font-size:12px;flex:1}
  .legend-col .row{display:flex;align-items:center;gap:8px}
  .legend-col .sw{width:9px;height:9px;border-radius:3px;flex:none}
  .legend-col .row b{margin-left:auto;font-variant-numeric:tabular-nums;font-weight:600}

  /* ---------- CHART ---------- */
  #complianceChart{width:100%;height:200px}

  /* ---------- SWITCH ---------- */
  .switch{position:relative;width:38px;height:22px;border-radius:99px;background:var(--panel-3);cursor:pointer;transition:background .14s;flex:none}
  .switch.on{background:var(--accent)}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .14s;box-shadow:0 1px 2px rgba(0,0,0,.3)}
  .switch.on::after{transform:translateX(16px)}

  /* ---------- AI / MOA ---------- */
  .ai-wrap{display:grid;grid-template-columns:1fr 280px;gap:14px;height:calc(100vh - 140px)}
  @media(max-width:1000px){.ai-wrap{grid-template-columns:1fr}}
  .chat{display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
  .chat .hd{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)}
  .chat .hd h3{margin:0;font-size:13px;font-weight:600}
  .chat .grow{flex:1}
  .chat .msgs{flex:1;overflow:auto;padding:18px 18px 8px;display:flex;flex-direction:column;gap:14px}
  .msg{display:flex;gap:10px;max-width:92%}
  .msg.user{margin-left:auto;flex-direction:row-reverse}
  .msg .av2{width:26px;height:26px;border-radius:7px;flex:none;display:grid;place-items:center;font-size:11px;font-weight:700;color:#fff}
  .msg.user .av2{background:var(--accent)}
  .msg.ai .av2{background:linear-gradient(135deg,var(--violet),var(--accent))}
  .msg .bubble{background:var(--panel-2);border:1px solid var(--border);border-radius:10px;padding:10px 13px;font-size:13px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
  .msg.user .bubble{background:var(--accent-soft);border-color:var(--accent-soft-2)}
  .msg .meta{font-size:10px;color:var(--muted-2);margin-top:4px}
  .chat .composer{border-top:1px solid var(--border);padding:12px 14px;display:flex;gap:9px;align-items:flex-end}
  .chat textarea{flex:1;resize:none;min-height:38px;max-height:140px;padding:9px 12px;font-family:var(--font);font-size:13px;
    background:var(--bg-2);color:var(--fg);border:1px solid var(--border);border-radius:9px;line-height:1.45;transition:.12s}
  .chat textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .providers{display:flex;flex-direction:column;gap:10px}
  .prov{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius);background:var(--panel-2)}
  .prov .st{width:8px;height:8px;border-radius:50%;flex:none;background:var(--muted-2)}
  .prov .st.on{background:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  .prov .st.warn{background:var(--amber);box-shadow:0 0 0 3px var(--amber-soft)}
  .prov .nm{font-size:12.5px;font-weight:550}
  .prov .md{font-size:10.5px;color:var(--muted);margin-left:auto;font-family:var(--mono)}
  .ctx-row{display:flex;align-items:center;gap:8px;padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius);background:var(--panel-2);font-size:11.5px;color:var(--muted)}
  .ctx-row .sw{width:8px;height:8px;border-radius:50%;background:var(--accent)}
  .typing{display:inline-flex;gap:3px;align-items:center}
  .typing i{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:bl 1s infinite}
  .typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
  @keyframes bl{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}

  /* ---------- MODAL ---------- */
  .ovl{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);z-index:1000;display:none}
  .ovl.show{display:block}
  .modal{position:fixed;z-index:1001;top:50%;left:50%;transform:translate(-50%,-50%);width:min(560px,94vw);
    background:var(--panel);border:1px solid var(--border-strong);border-radius:14px;box-shadow:var(--shadow);display:none;overflow:hidden}
  .modal.show{display:block}
  .modal .mhd{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--border)}
  .modal .mhd .mav{width:38px;height:38px;border-radius:9px;display:grid;place-items:center;font-size:14px;font-weight:700;color:#fff;flex:none}
  .modal .mhd h2{margin:0;font-size:15px;font-weight:600;letter-spacing:-.02em}
  .modal .mhd .msub{font-size:11.5px;color:var(--muted);font-family:var(--mono)}
  .modal .mbody{padding:16px 18px;max-height:60vh;overflow:auto}
  .kv{display:grid;grid-template-columns:120px 1fr;gap:1px;background:var(--border);border-radius:10px;overflow:hidden;border:1px solid var(--border)}
  .kv>div{padding:9px 12px;background:var(--panel)}
  .kv .k{font-size:11.5px;color:var(--muted);font-weight:500}
  .kv .v{font-size:12.5px;font-weight:500;word-break:break-word}
  #mTrail{width:100%;height:200px;border-radius:10px;margin-top:12px;border:1px solid var(--border)}
  .xbtn{width:30px;height:30px;display:grid;place-items:center;border-radius:7px;border:1px solid var(--border);background:var(--panel);color:var(--muted);cursor:pointer}
  .xbtn:hover{color:var(--fg);background:var(--panel-2)}

  /* ---------- COMMAND PALETTE ---------- */
  .cmdk{position:fixed;inset:0;z-index:1100;display:none;align-items:flex-start;justify-content:center;padding-top:14vh;
    background:rgba(0,0,0,.45);backdrop-filter:blur(3px)}
  .cmdk.show{display:flex}
  .cmdk-box{width:min(580px,92vw);background:var(--panel);border:1px solid var(--border-strong);border-radius:12px;
    box-shadow:var(--shadow);overflow:hidden;animation:pop .12s ease}
  @keyframes pop{from{opacity:0;transform:translateY(-8px) scale(.98)}to{opacity:1;transform:none}}
  .cmdk-box input{width:100%;height:46px;padding:0 16px;font-size:14px;background:transparent;border:0;border-bottom:1px solid var(--border);color:var(--fg);outline:none;font-family:var(--font)}
  .cmdk-list{max-height:340px;overflow:auto;padding:6px}
  .cmdk .group{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted-2);font-weight:600;padding:8px 12px 4px}
  .cmdk .item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;cursor:pointer;font-size:13px}
  .cmdk .item .ic{width:16px;height:16px;color:var(--muted)}
  .cmdk .item .k{margin-left:auto;font-size:10.5px;color:var(--muted-2);font-family:var(--mono)}
  .cmdk .item.sel{background:var(--accent-soft);color:#fff}
  html[data-theme="light"] .cmdk .item.sel{color:var(--accent)}
  .cmdk .item svg{width:16px;height:16px}

  /* skeleton */
  .sk{background:linear-gradient(90deg,var(--panel-2) 25%,var(--panel-3) 37%,var(--panel-2) 63%);background-size:400% 100%;animation:sh 1.3s ease infinite;border-radius:5px}
  @keyframes sh{0%{background-position:100% 0}100%{background-position:-100% 0}}

  /* toast */
  #toasts{position:fixed;bottom:18px;right:18px;z-index:2000;display:flex;flex-direction:column;gap:8px}
  .toast{background:var(--panel);border:1px solid var(--border-strong);border-radius:9px;padding:10px 14px;box-shadow:var(--shadow);
    font-size:12.5px;min-width:200px;animation:tin .2s ease;display:flex;flex-direction:column;gap:1px}
  .toast b{font-weight:600} .toast small{color:var(--muted)}
  .toast.ok{border-left:3px solid var(--green)} .toast.bad{border-left:3px solid var(--red)} .toast.info{border-left:3px solid var(--accent)}
  @keyframes tin{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px 20px;color:var(--muted);text-align:center}
  .empty svg{width:34px;height:34px;opacity:.5}
  .empty .t{font-size:13px;font-weight:550;color:var(--fg-2)} .empty .s{font-size:11.5px}

  /* workflow / policy rows */
  .alist{display:flex;flex-direction:column;gap:8px}
  .aitem{display:flex;align-items:center;gap:11px;padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--panel-2)}
  .aitem .ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent);flex:none}
  .aitem .ic svg{width:15px;height:15px}
  .aitem .nm{font-weight:550;font-size:12.5px}
  .aitem .ds{font-size:11px;color:var(--muted)}
  .aitem .grow{flex:1;min-width:0}
  .aitem .act{color:var(--muted-2);cursor:pointer;padding:5px;border-radius:6px}
  .aitem .act:hover{color:var(--red);background:var(--red-soft)}

  .field{margin-bottom:14px}
  .field label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .input{width:100%;height:38px;padding:0 12px;font-size:13px;background:var(--bg-2);color:var(--fg);border:1px solid var(--border);border-radius:8px;transition:.12s;font-family:var(--font)}
  .input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  textarea.input{height:auto;padding:10px 12px;line-height:1.5;resize:vertical;min-height:80px}
  .sel{width:100%;height:38px;padding:0 12px;font-size:13px;background:var(--bg-2);color:var(--fg);border:1px solid var(--border);border-radius:8px;font-family:var(--font);appearance:none}
  .sel:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .seg{display:inline-flex;background:var(--bg-2);border:1px solid var(--border);border-radius:8px;padding:2px;gap:2px}
  .seg button{border:0;background:transparent;color:var(--muted);font-size:12px;font-weight:550;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:inherit}
  .seg button.active{background:var(--accent);color:#fff}
  .test-result{margin-top:10px;font-size:12px;padding:10px 12px;border-radius:8px;display:none}
  .test-result.show{display:block} .test-result.ok{background:var(--green-soft);color:var(--green)} .test-result.bad{background:var(--red-soft);color:var(--red)}
  .spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--muted-2);border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .switch-row{display:flex;align-items:center;gap:12px;margin:14px 0}
  .switch-row .lab{font-size:13px;font-weight:500} .switch-row .ds{font-size:11px;color:var(--muted)}

  /* --- Inventory / Alerts views (added for design consistency) --- */
  .view-head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:2px 0 14px;flex-wrap:wrap}
  .view-head h2{font-size:15px;font-weight:650;margin:0}
  .view-head .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .view-head .acts{display:flex;gap:8px;flex-wrap:wrap}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px}
  .chips .chip{font-size:11.5px;font-weight:550;padding:5px 11px;border-radius:999px;border:1px solid var(--border);background:var(--panel-2);color:var(--muted);cursor:pointer;transition:.12s}
  .chips .chip:hover{border-color:var(--accent);color:var(--fg)}
  .chips .chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .tbl{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--panel-2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .tbl thead th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;color:var(--muted);padding:10px 12px;background:var(--bg-2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
  .tbl thead th:hover{color:var(--fg)}
  .tbl tbody td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
  .tbl tbody tr:last-child td{border-bottom:0}
  .tbl tbody tr:hover{background:var(--bg-2)}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
  .btn.ghost:hover{border-color:var(--accent);color:var(--fg)}
  .btn.sec{background:var(--bg-2);border:1px solid var(--border);color:var(--fg)}
  .btn.sec:hover{border-color:var(--accent)}
  .btn.sm.bad{background:var(--red-soft);border-color:var(--red);color:var(--red)}
  .btn.sm.bad:hover{background:var(--red);color:#fff}
  </style>
</head>
<body>
  <div class="app">
    <!-- SIDEBAR -->
    <aside class="side">
      <div class="brand">
        <div class="lg"><span data-reicon="shield-check" data-size="16"></span></div>
        <div><b>Geofence UEM</b><small>Command Center</small></div>
      </div>
      <div class="nav-sec">Operación</div>
      <nav class="nav" id="nav"></nav>
      <div class="spacer"></div>
      <div class="side-foot">
        <div class="plan"><span class="p">Plan</span><span class="pill" id="planPill">Free</span>
          <b id="orgName" style="margin-left:auto;font-size:11px"></b></div>
        <div class="row"><span>Ciclo</span><b id="ratePill">15 min</b></div>
        <div class="row" style="margin-top:6px"><span>Estado</span><b id="modeText" style="color:var(--green)">live</b></div>
      </div>
    </aside>

    <!-- MAIN -->
    <div class="main">
      <header class="topbar">
        <div class="crumbs"><span class="pv" id="crumbP">Geofence</span><span class="sep">/</span><span class="cv" id="crumbC">Resumen</span></div>
        <div class="grow"></div>
        <div class="sync" id="sync"><span class="dot"></span><span id="syncText">En vivo</span></div>
        <button class="ibtn" id="cmdBtn" title="Paleta de comandos (⌘K)"><span data-reicon="menu" data-size="16"></span></button>
        <button class="ibtn" id="themeBtn" title="Tema"><span data-reicon="eye" data-size="16"></span></button>
        <button class="btn" id="refreshBtn"><span data-reicon="refresh" data-size="15"></span>Refrescar</button>
        <button class="btn primary" id="cycleBtn"><span data-reicon="bolt" data-size="15"></span>Forzar ciclo</button>
      </header>

      <!-- VIEWS -->
      <div class="view" id="view-overview"></div>
      <div class="view hidden" id="view-map"></div>
      <div class="view hidden" id="view-devices"></div>
      <div class="view hidden" id="view-inventory"></div>
      <div class="view hidden" id="view-ai"></div>
      <div class="view hidden" id="view-events"></div>
      <div class="view hidden" id="view-incidents"></div>
      <div class="view hidden" id="view-soar"></div>
      <div class="view hidden" id="view-actions"></div>
      <div class="view hidden" id="view-alerts"></div>
      <div class="view hidden" id="view-fences"></div>
      <div class="view hidden" id="view-routes"></div>
      <div class="view hidden" id="view-workflows"></div>
      <div class="view hidden" id="view-goals"></div>
      <div class="view hidden" id="view-settings"></div>
    </div>
  </div>

  <!-- OVERLAY / MODAL / COMMAND PALETTE -->
  <div class="ovl" id="ovl"></div>
  <div class="modal" id="devModal">
    <div class="mhd">
      <div class="mav" id="mAv">?</div>
      <div style="flex:1;min-width:0">
        <h2 id="mName">—</h2><div class="msub" id="mId"></div>
      </div>
      <div id="mTag"></div>
      <button class="xbtn" id="mClose"><span data-reicon="x-square" data-size="16"></span></button>
    </div>
    <div class="mbody">
      <div class="kv" id="mKv"></div>
      <div style="margin-top:14px">
        <div style="font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:8px">Comandos remotos (MDM/UEM)</div>
        <div class="row gap wrap" id="mCmd">
          <button class="btn sm" data-cmd="lock">🔒 Bloquear</button>
          <button class="btn sm" data-cmd="wipe">⚠️ Borrar</button>
          <button class="btn sm" data-cmd="locate">📍 Localizar</button>
          <button class="btn sm" data-cmd="reboot">🔄 Reiniciar</button>
          <button class="btn sm" data-cmd="clear_passcode">🔑 Reset PIN</button>
          <button class="btn sm" data-cmd="message">💬 Mensaje</button>
        </div>
      </div>
      <div style="margin-top:14px;font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.05em;font-weight:600">Apps instaladas · CVE</div>
      <div id="mApps" style="margin-top:8px"></div>
      <div id="mTrail"></div>
      <div style="margin-top:14px;font-size:11px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.05em;font-weight:600">Actividad reciente</div>
      <div id="mEvents" style="margin-top:8px"></div>
    </div>
  </div>
  <div class="cmdk" id="cmdk"><div class="cmdk-box"><input id="cmdkInput" placeholder="Buscar comando o dispositivo…" /><div class="cmdk-list" id="cmdkList"></div></div></div>

  <div id="toasts"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="/static/reicon-data.js"></script>
  <script src="/static/reicon.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
