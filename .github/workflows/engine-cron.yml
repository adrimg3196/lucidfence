name: engine-cron

# Backend serverless de LucidFence en GitHub Actions (gratis, siempre-on vía
# schedule cada 15 min). Construye la flota demo, corre el engine de geofencing
# y publica el estado vivo a data/cloud_state.json, que GitHub Pages sirve al
# dashboard. Soporta workflow_dispatch para forzar un ciclo on-demand.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      cycles:
        description: "Número de ciclos a correr"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar deps
        run: python -m pip install -r requirements.txt
      - name: Correr ciclo y publicar estado
        env:
          CLOUD_PUBLISH: "1"
        run: |
          python cloud_publisher.py --cycles "${{ github.event.inputs.cycles || '1' }}"
      - name: Commitear estado al repo (lo sirve Pages)
        run: |
          git config user.name "lucidfence-cloud[bot]"
          git config user.email "cloud@lucidfence.local"
          git add data/cloud_state.json
          if git diff --cached --quiet; then
            echo "Sin cambios en cloud_state.json"
          else
            git commit -m "cloud: actualizar estado en vivo ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          fi
