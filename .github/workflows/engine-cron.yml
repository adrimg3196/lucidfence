name: engine-cron

# Engine de LucidFence en cron (gratis, sin servidor always-on).
# Cada 15 min: instala deps, arranca el SaaS + engine y corre un
# ciclo on-demand. El engine envia alertas/incidentes via Atomic Mail
# (requiere secretos ATOMIC_MAIL_API_KEY / ATOMIC_MAIL_USER en Settings).
# La IA (MoA) es opcional: si no hay MoA local, core.ai hace
# fallback a texto plano (never raises). Para IA real, anade un paso
# que clone tu MoA o monta las claves de free tiers.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar deps
        run: |
          python -m pip install -r requirements.txt
      - name: Correr ciclo del engine (Atomic Mail + fallback IA)
        env:
          ATOMIC_MAIL_API_KEY: ${{ secrets.ATOMIC_MAIL_API_KEY }}
          ATOMIC_MAIL_USER: ${{ secrets.ATOMIC_MAIL_USER }}
          MOA_DRY: "true"
        run: |
          python saas_server.py &
          sleep 4
          curl -s -X POST http://127.0.0.1:8765/api/run-once || true
      - name: Resumen
        run: echo "Ciclo LucidFence completado (ver alertas en Atomic Mail)."
