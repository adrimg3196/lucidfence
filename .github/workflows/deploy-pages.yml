name: deploy-pages

# Landing + dashboard estático a GitHub Pages (siempre-on, gratis).
# Copia static/ a la raíz del artefacto con -L (dereferencia symlinks)
# para evitar el fallo de deploy-pages con enlaces simbólicos.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Preparar artefacto (static/ -> raíz, sin symlinks)
        run: |
          rm -rf _pages && mkdir -p _pages
          cp -rL static/. _pages/
          # landing es la portada
          [ -f _pages/index.html ] || cp _pages/landing.html _pages/index.html
          ls -la _pages | head
      - name: Subir artefacto de Pages
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: _pages
          include-hidden-files: false
          retention-days: 1
      - name: Desplegar a Pages
        id: deployment
        uses: actions/deploy-pages@v4
