name: build-web-bundle

# Build-only: LucidFence does not operate a canonical hosted runtime.
# End users download/fork the bundle and deploy it in their own infrastructure.
on:
  push:
    branches: [main]
    paths:
      - "static/web*"
      - "static/sw.js"
      - "static/manifest.webmanifest"
      - "static/lucidfence-icon.svg"
      - "deploy/web/**"
      - "scripts/build_web_bundle.py"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Construir bundle estático owner-neutral
        run: python3 scripts/build_web_bundle.py
      - name: Verificar checksums
        working-directory: dist/lucidfence-web
        run: sha256sum -c SHA256SUMS
      - name: Publicar artefacto descargable, no hosting
        uses: actions/upload-artifact@v4
        with:
          name: lucidfence-web
          path: dist/lucidfence-web.zip
          if-no-files-found: error
          retention-days: 30
