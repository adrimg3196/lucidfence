name: health-monitor

# Runs health check against live and creates issue on failure (#18).
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      host:
        description: 'Health base URL'
        required: false
        default: 'http://127.0.0.1:8765'

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 scripts/health_monitor.py --host '${{ github.event.inputs.host || 'http://127.0.0.1:8765' }}' --repo ${{ github.repository }}
