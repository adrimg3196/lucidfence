name: health-monitor

# Manual health check against an explicitly supplied live deployment.
# A hosted GitHub runner cannot reach the developer's 127.0.0.1.
on:
  workflow_dispatch:
    inputs:
      host:
        description: 'Health base URL'
        required: true

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 scripts/health_monitor.py --host '${{ github.event.inputs.host }}' --repo ${{ github.repository }}
