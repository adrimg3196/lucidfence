server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy no-referrer always;
  add_header Permissions-Policy "camera=(), microphone=(), payment=(), usb=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; worker-src 'self'; connect-src 'self' https:; img-src 'self' data:; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

  location = /sw.js { add_header Cache-Control "no-cache"; try_files $uri =404; }
  location ~* \.(html|webmanifest)$ { add_header Cache-Control "no-cache"; try_files $uri =404; }
  location / { try_files $uri $uri/ =404; }
}
